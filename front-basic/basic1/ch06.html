<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <form action="http://localhost:8080/servlet_study_war_exploded/api/html/form" method="post" enctype="multipart/form-data">
            <div>
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="사용자이름을 입력하세요" autofocus required>
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" id="password" value="1234" name="password" required>
            </div>
            <div>
                <label for="student1">학생</label>
                <input type="checkbox" id="student1" name="job1" value="학생1">
                <label for="teacher1">선생님</label>
                <input type="checkbox" id="teacher1" name="job1" value="선생님1" disabled>
                <label for="developer1">개발자</label>
                <input type="checkbox" id="developer1" name="job1" value="개발자1"> 
            </div>
            <div>
                <label for="student2">학생</label>
                <input type="radio" id="student2" name="job2" value="학생2">
                <label for="teacher2">선생님</label>
                <input type="radio" id="teacher2" name="job2" value="선생님2">
                <label for="develope2">개발자</label>
                <input type="radio" id="developer2" name="job2" value="개발자2"> <!--name 속성으로 그룹핑-->
            </div>
            <div>
                <label for="profileFile">첨부파일</label>
                <input type="file" name="profileFile" id="profileFile">
            </div>
            <div>
                
                <textarea name="" id=""></textarea>
            </div>
            <div>
                <select name="" id="">
                    <optgroup label="선택목록1">
                        <option value="">선택1</option>
                        <option value="">선택2</option>
                        <option value="">선택3</option>
                    </optgroup>
                    <optgroup label="선택목록2">
                        <option value="">선택4</option>
                        <option value="">선택5</option>
                        <option value="">선택6</option>
                    </optgroup>
                </select>
            </div>
            <div>
                <input type="text" list="nameList">
                <datalist id="nameList">
                    <option value="김은채">김은채</option>
                    <option value="박은채">박은채</option>
                    <option value="이은채">이은채</option>
                    <option value="최은채">최은채</option>
                </datalist>
            </div>
            <button type="submit">전송</button>
            <button type="button" disabled>확인</button>
            <button type="button">열기</button>
        </form>
    </body>
</html>
