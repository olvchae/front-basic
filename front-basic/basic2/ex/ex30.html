<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                height: 100vh;
                margin: 0;
                background-color: #f0f0f0;
            }

            .login-box {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 400px;
                padding: 40px;
                background-color: white;
                border: 1px solid #ddd;
                border-radius: 12px;
            }

            input:not([type=checkbox])  {
                width: 100%;
                padding: 12px;
                margin-bottom: 15px;
                box-sizing: border-box;
            }
            .check {
                padding-bottom: 12px;
            }

            button {
                width: 100%;
                padding: 14px;
                background-color: #065A82;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
            }

            button:hover {
                background-color: #72a0bb;
                
            }
        </style>
    </head>
    <body>
        <form action="" method="post">
            <div class="login-box">
                <h1>로그인</h1>
                <div>
                    <label for="id">ID</label>
                    <input type="text" id="id">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password">
                </div>
                <div class="check"> 
                    <label for="chekbox">아이디 기억하기</label>
                    <input type="checkbox" id="checkbox" value="">
                </div>
                <div>
                    <button type="button">로그인</button>
                </div>
                <p>계정이 없으신가요? <a href="">회원가입</a></p>
            </div>
        </form>
    </body>
</html>
