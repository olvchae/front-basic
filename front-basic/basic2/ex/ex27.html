<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .sidebar {
                display: inline-block;
                width: 200px;
                height: 200px;
                background-color: #f0f0f0;
                vertical-align: top;
                padding: 20px;
                box-sizing: border-box;
            }

            .main {
                display: inline-block;
                width: calc(100% - 210px);
                background-color: yellowgreen;
                vertical-align: top;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <div class="sidebar">
            왼쪽 사이드바
        </div>
        <div class="main">
            메인 콘텐츠
        </div>
</html>
