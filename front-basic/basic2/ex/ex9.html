<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            form {
                width: 400px;
                margin: auto;
                padding: 30px;
                background-color: #f9f9f9;
                border: 1px solid #ddd;
            }

            input[type=text], 
            input[type=email], 
            input[type=password], 
            input[type=date],
            textarea {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                box-sizing: border-box;
                border: 1px solid #ccc;
            }

            input[type=submit] {
                background-color: #F97316;
                color: white;
                padding: 12px 0;
                width: 100%;
                border: none;
                cursor: pointer;
            }
            


        </style>
    </head>
    <body>
        <form action="siginin" method="psot">
            <div>
                <label for="username">이름</label>
                <input type="text" id="username" name="username" placeholder="이름을 입력하세요">
            </div>
            <div>
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="이메일을 입력하세요">
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요">
            </div>
            <div>
                <label for="date">생년월일</label>
                <input type="date" id="date" name="date">
            </div>
            <div>
                <label for="male">남자</label>
                <input type="radio" name="남자" id="male" value="남자">
                <label for="female">여자</label>
                <input type="radio" name="여자" id="female" value="여자">
            </div>
            <div>
                <label for="computer">컴퓨터공학</label>
                <input type="checkbox" name="field" id="computer" value="컴퓨터공학">
                <label for="ai">인공지능</label>
                <input type="checkbox" name="field" id="ai" value="인공지능">
                <label for="Mechanical">기계공학</label>
                <input type="checkbox" name="field" id="Mechanical" value="기계공학">
            </div>
            <div>
                <textarea rows="5" cols="4"></textarea>
            </div>
            <input type="submit" name="가입하기">
        </form>
    </body>
</html>
