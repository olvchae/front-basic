<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            
            .modal-overlay {
                display: none;
                position: fixed;
                top: 0;
                right: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0,0,0,0.5);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .modal-box {
                background-color: white;
                padding: 30px;
                border-radius: 12px;
                width: 400px;
                text-align: center;                
            }

            button {
                padding: 10px 24px;
                margin: 5px;
                border-radius: 6px;
                cursor: pointer;
            }

            .x {
                background-color: #eee;
            }

            .o {
                background-color: #EF4444;
                color: white;
            }
        </style>
    </head>
    <body>
        <!-- 모달 오버레이 (평소에는 display:none) -->
        <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <h2>알림</h2>
            <p>정말 삭제하시겠습니까?</p>
            <button onclick="document.getElementById('modal').style.display='none'" class="x">취소</button>
            <button onclick="alert('삭제 완료!')" class="o">확인</button>
        </div>
        </div>

        <!-- 트리거 버튼 -->
        <button onclick="document.getElementById('modal').style.display='flex'">삭제하기</button>
    </body>
</html>
