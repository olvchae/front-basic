<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .box-a {
                width: 200px;
                padding: 20px;
                border: 5px solid black;
                box-sizing: content-box;  /* 기본값 */
            }

            .box-b {
                width: 200px;
                padding: 20px;
                border: 5px solid black;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <!--
        [질문]
            - box-a의 실제 보이는 너비: _200__px (계산 과정: box-sizing을 콘텐츠 크기로 설정했기 때문에 200에 맞춰짐 )
            - box-b의 실제 보이는 너비: _250__px (계산 과정: border까지의 크기로 맞춤 )
            - 어느 것이 더 직관적인가? 이유는?
        -->
    </body>
</html>
