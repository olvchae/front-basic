<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .product-card {
                position: relative;
                width: 250px;
                padding: 20px;
                border: 1px solid #ddd;
            }

            .badge {
                position: absolute;
                top: 10px;
                right: 10px;
                background-color: red;
                color: white;
                padding: 4px 12px;
                font-size: 12px;
                border-radius: 4px;

            }
        </style>
    </head>
    <body>
        <div class="product-card">
            <div class="badge">NEW</div>
            <h3>갤럭시 S25</h3>
            <p>1,200,000원</p>
        </div>
    </body>
</html>
