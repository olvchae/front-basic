<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            li.new::after {
                content: "NEW!!";
                font-size: x-small;
                margin-left: 5px;
                border-radius: 2px;
                padding: 1px 2px;
                background-color: red;
                color: white;
            }
        </style>
    </head>
    <body>
        <ul>
            <li class="new">상품1</li>
            <li>상품2</li>
            <li>상품3</li>
            <li>상품4</li>
        </ul>
        <script>
            const list = document.querySelectorAll("li");
            for (let i = 0; i < list.length; i++) {
                if (i % 2 == 0) {
                    list[i].classList.add("new");
                }
            }
        </script>
    </body>
</html>
