<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .input-box {
                position: relative;
                width: 300px;
                height: 40px;
            }

            .username-input {
                box-sizing: border-box;
                padding-right: 85px;
                width: 100%;
                height: 40px;
            }

            .duplicated-btn {
                position: absolute;
                top: 50%;
                right: 10px;
                transform: translate(-50%);
            }

            .input-box2 {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 2;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 10px;
                padding: 10px;
                width: 300px;
                height: 40px;
            }

            .username-input2 {
                flex: 1;
                outline: none;
                border: none;
            }

            .duplicated-btn2 {
                transition: transform 1s ease-in-out;
            }

            .duplicated-btn2:hover {
                transform: translate(50%) scale(130%);
            }

            .box{
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100px;
                height: 100px;
                background-color: beige;
                font-size: 40px;
                transform: rotate(45deg);
            }
        </style>
    </head>
    <body>
        <div class="input-box">
            <input type="text" class="username-input">
            <button class="duplicated-btn">중복확인</button>
        </div>

        <div class="input-box2">
            <input type="text" class="username-input2">
            <button class="duplicated-btn2">중복확인</button>
        </div>

        <div class="box">B</div>
    </body>
</html>
