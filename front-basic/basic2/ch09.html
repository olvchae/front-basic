<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .box {
                margin-bottom: 10px;
                width: 200px;
                height: 200px;
                background-color: black;
            }

            #t1:target {
                background-color: red;
            }

            #t2:target {
                background-color: green;
            } 

            #t3:target {
                background-color: blue;
            }
        </style>
    </head>
    <body>
        <header>
            <a href="#t1">A</a>
            <a href="#t2">B</a>
            <a href="#t3">C</a>
        </header>
        <div>
            <div id="t1" class="box"></div>
            <div id="t2" class="box"></div>
            <div id="t3" class="box"></div>
        </div>
    </body>
</html>
