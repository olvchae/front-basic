<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            ul {
                display: flex;
                flex-wrap: wrap;
                justify-content: flex-start;
                gap: 20px;
                list-style-type: none;
                border: 1px solid #222;
                padding: 10px;
                width: 400px;
                height: 30px;
            }

            li {
              border: 1px solid #222;
              width: 100px;
              height: 20px;
              /* flex-grow: 1;
              flex-shrink: 1; */
              flex: 1 1;  /*grow shrink*/
            }

            li.item {
               flex-grow: 2;  /*남은 공간에서 2를 가져감*/
            }
        </style>
    </head>
    <body>
        <nav>
            <ul>
                <li class="item"></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </nav>
    </body>
</html>
