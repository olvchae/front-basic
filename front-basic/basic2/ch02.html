<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            table {
                border: 1px solid #222;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid #222;
                width: 100px;
                height:  30px;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
            </tr>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
        </table>
    </body>
</html>
