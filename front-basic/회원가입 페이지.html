<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F6EF7;
      --primary-hover: #3B58E0;
      --primary-light: #EEF1FF;
      --success: #22C55E;
      --error: #EF4444;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #EEF1FF 0%, #F0F4FF 50%, #E8ECFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(79, 110, 247, 0.12), 0 2px 8px rgba(0,0,0,0.06);
      width: 100%;
      max-width: 440px;
      padding: 48px 40px 40px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 44px;
      height: 44px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 24px; height: 24px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    h1 { font-size: 22px; font-weight: 700; color: var(--gray-900); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 32px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      width: 16px; height: 16px;
      stroke: var(--gray-400);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 0 14px 0 42px;
      font-size: 14px;
      font-family: inherit;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79,110,247,0.12);
    }
    input:focus + svg, .input-wrap:focus-within svg { stroke: var(--primary); }

    input.valid { border-color: var(--success); }
    input.invalid { border-color: var(--error); }

    .hint {
      font-size: 12px;
      color: var(--gray-400);
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 16px;
      transition: color 0.2s;
    }
    .hint.ok { color: var(--success); }
    .hint.err { color: var(--error); }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    /* 비밀번호 강도 */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .strength-bar span {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: var(--gray-200);
      transition: background 0.3s;
    }
    .strength-bar.s1 span:nth-child(1) { background: var(--error); }
    .strength-bar.s2 span:nth-child(1), .strength-bar.s2 span:nth-child(2) { background: #F59E0B; }
    .strength-bar.s3 span { background: var(--success); }

    /* 약관 */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .terms:hover { border-color: var(--primary); background: var(--primary-light); }
    .terms.checked { border-color: var(--primary); background: var(--primary-light); }

    .terms input[type="checkbox"] { display: none; }
    .checkbox-box {
      width: 18px; height: 18px;
      border: 2px solid var(--gray-300, #D1D5DB);
      border-radius: 5px;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .terms.checked .checkbox-box {
      background: var(--primary);
      border-color: var(--primary);
    }
    .checkbox-box svg { display: none; width: 11px; height: 11px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .terms.checked .checkbox-box svg { display: block; }
    .terms-text { font-size: 13px; color: var(--gray-700); line-height: 1.5; }
    .terms-text a { color: var(--primary); text-decoration: none; font-weight: 600; }

    /* 버튼 */
    .btn {
      width: 100%;
      height: 52px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(79,110,247,0.35);
    }
    .btn:hover { background: var(--primary-hover); box-shadow: 0 6px 20px rgba(79,110,247,0.45); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--gray-200); color: var(--gray-400); box-shadow: none; cursor: not-allowed; }

    .login-link {
      text-align: center;
      font-size: 13px;
      color: var(--gray-500);
      margin-top: 20px;
    }
    .login-link a { color: var(--primary); font-weight: 600; text-decoration: none; }

    /* 성공 화면 */
    .success-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      animation: fadeUp 0.5s ease both;
    }
    .success-screen.show { display: flex; }
    .success-icon {
      width: 72px; height: 72px;
      background: #DCFCE7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .success-icon svg { width: 36px; height: 36px; stroke: var(--success); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .success-screen h2 { font-size: 20px; font-weight: 700; color: var(--gray-900); }
    .success-screen p { font-size: 14px; color: var(--gray-500); line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <!-- 회원가입 폼 -->
  <div id="formView">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <h1>회원가입</h1>
    <p class="subtitle">계정을 만들고 시작해보세요 👋</p>

    <div class="form-group">
      <!-- 이름 / 닉네임 -->
      <div class="row">
        <div class="field">
          <label for="name">이름</label>
          <div class="input-wrap">
            <input type="text" id="name" placeholder="홍길동">
            <svg viewBox="0 0 24 24" style="left:13px"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="hint" id="nameHint"></span>
        </div>
        <div class="field">
          <label for="nick">닉네임</label>
          <div class="input-wrap">
            <input type="text" id="nick" placeholder="내닉네임">
            <svg viewBox="0 0 24 24" style="left:13px"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <span class="hint" id="nickHint"></span>
        </div>
      </div>

      <!-- 이메일 -->
      <div class="field">
        <label for="email">이메일</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="hello@example.com">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m2 7 10 7 10-7"/></svg>
        </div>
        <span class="hint" id="emailHint"></span>
      </div>

      <!-- 비밀번호 -->
      <div class="field">
        <label for="pw">비밀번호</label>
        <div class="input-wrap">
          <input type="password" id="pw" placeholder="8자 이상 입력">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="strength-bar" id="strengthBar">
          <span></span><span></span><span></span>
        </div>
        <span class="hint" id="pwHint"></span>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="field">
        <label for="pw2">비밀번호 확인</label>
        <div class="input-wrap">
          <input type="password" id="pw2" placeholder="비밀번호 재입력">
          <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4"/><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <span class="hint" id="pw2Hint"></span>
      </div>

      <!-- 약관 동의 -->
      <label class="terms" id="termsLabel">
        <input type="checkbox" id="terms">
        <div class="checkbox-box">
          <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
        </div>
        <span class="terms-text">
          <a href="#">이용약관</a> 및 <a href="#">개인정보 처리방침</a>에 동의합니다.
        </span>
      </label>

      <button class="btn" id="submitBtn" disabled>가입하기</button>
    </div>

    <p class="login-link">이미 계정이 있으신가요? <a href="#">로그인</a></p>
  </div>

  <!-- 성공 화면 -->
  <div class="success-screen" id="successView">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h2>가입 완료! 🎉</h2>
    <p>환영합니다!<br>이제 로그인하고 서비스를 이용해보세요.</p>
    <button class="btn" style="margin-top:8px" onclick="reset()">처음으로 돌아가기</button>
  </div>
</div>

<script>
  const nameEl  = document.getElementById('name');
  const nickEl  = document.getElementById('nick');
  const emailEl = document.getElementById('email');
  const pwEl    = document.getElementById('pw');
  const pw2El   = document.getElementById('pw2');
  const termsEl = document.getElementById('terms');
  const termsLabel = document.getElementById('termsLabel');
  const submitBtn  = document.getElementById('submitBtn');
  const strengthBar = document.getElementById('strengthBar');

  function setHint(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'hint ' + (type || '');
  }
  function setInput(el, state) {
    el.className = state; // 'valid' | 'invalid' | ''
  }

  // 이름
  nameEl.addEventListener('input', () => {
    const v = nameEl.value.trim();
    if (!v) { setInput(nameEl,''); setHint('nameHint',''); }
    else if (v.length < 2) { setInput(nameEl,'invalid'); setHint('nameHint','최소 2자 이상 입력해주세요','err'); }
    else { setInput(nameEl,'valid'); setHint('nameHint','✓ 좋아요!','ok'); }
    validate();
  });

  // 닉네임
  nickEl.addEventListener('input', () => {
    const v = nickEl.value.trim();
    if (!v) { setInput(nickEl,''); setHint('nickHint',''); }
    else if (v.length < 2) { setInput(nickEl,'invalid'); setHint('nickHint','2자 이상 입력해주세요','err'); }
    else { setInput(nickEl,'valid'); setHint('nickHint','✓ 사용 가능','ok'); }
    validate();
  });

  // 이메일
  emailEl.addEventListener('input', () => {
    const v = emailEl.value.trim();
    const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    if (!v) { setInput(emailEl,''); setHint('emailHint',''); }
    else if (!ok) { setInput(emailEl,'invalid'); setHint('emailHint','올바른 이메일 형식을 입력해주세요','err'); }
    else { setInput(emailEl,'valid'); setHint('emailHint','✓ 이메일 형식이 맞아요','ok'); }
    validate();
  });

  // 비밀번호 강도
  function pwStrength(v) {
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v) || /[!@#$%^&*]/.test(v)) s++;
    if (v.length >= 12) s++;
    return s;
  }

  pwEl.addEventListener('input', () => {
    const v = pwEl.value;
    strengthBar.className = 'strength-bar';
    if (!v) { setInput(pwEl,''); setHint('pwHint',''); return; }
    const s = pwStrength(v);
    if (v.length < 8) { setInput(pwEl,'invalid'); setHint('pwHint','8자 이상 입력해주세요','err'); }
    else {
      strengthBar.className = 'strength-bar s' + s;
      const labels = ['','약함','보통','강함'];
      const types = ['','err','','ok'];
      setInput(pwEl, s < 2 ? '' : 'valid');
      setHint('pwHint', '강도: ' + labels[s], types[s]);
    }
    // 확인란도 재검증
    if (pw2El.value) pw2El.dispatchEvent(new Event('input'));
    validate();
  });

  pw2El.addEventListener('input', () => {
    const v = pw2El.value;
    if (!v) { setInput(pw2El,''); setHint('pw2Hint',''); }
    else if (v !== pwEl.value) { setInput(pw2El,'invalid'); setHint('pw2Hint','비밀번호가 일치하지 않아요','err'); }
    else { setInput(pw2El,'valid'); setHint('pw2Hint','✓ 비밀번호가 일치해요','ok'); }
    validate();
  });

  // 약관
  termsLabel.addEventListener('click', () => {
    termsEl.checked = !termsEl.checked;
    termsLabel.classList.toggle('checked', termsEl.checked);
    validate();
  });

  function validate() {
    const ok =
      nameEl.value.trim().length >= 2 &&
      nickEl.value.trim().length >= 2 &&

      /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim()) &&
      pwEl.value.length >= 8 &&
      pw2El.value === pwEl.value &&
      termsEl.checked;
    submitBtn.disabled = !ok;
  }

  submitBtn.addEventListener('click', () => {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('successView').classList.add('show');
  });

  function reset() {
    document.getElementById('formView').style.display = '';
    document.getElementById('successView').classList.remove('show');
    [nameEl, nickEl, emailEl, pwEl, pw2El].forEach(el => {
      el.value = ''; el.className = '';
    });
    ['nameHint','nickHint','emailHint','pwHint','pw2Hint'].forEach(id => setHint(id,''));
    termsEl.checked = false;
    termsLabel.classList.remove('checked');
    strengthBar.className = 'strength-bar';
    submitBtn.disabled = true;
  }
</script>
</body>
</html>
