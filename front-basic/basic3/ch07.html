<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            margin: 0;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            margin: 0 auto;
            width: 1200px;
            height: 100%;
            overflow: auto;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 4px #00000044;
            padding: 20px;
        }

        .input-box {
            position: relative;
            box-sizing: border-box;
            margin-bottom: 15px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow: hidden;

            & > label {
                transition: all 0.3 ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #222;
            }

            & > input {
                transition: all 0.3 ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                color: #222;
            }
        }

        .input-is-not-empty {
            & > label {
                font-size: 12px;
                top: 25%;
            }

            & > input {
                top: 20%;
                height: 80%;
            }
        }

        .register-button {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: none;
            border-radius: 4px;
            width: 100%;
            height: 40px;
            color: white;
            background-color: rgba(27, 75, 231, 0.842);
            cursor: pointer;

            &:hover {
                background-color: rgb(9, 9, 139);
            }
        }
    </style>
</head>
<body>
    <!-- 1. input 2개 (username, password)-->
    <!-- 2. button 2개 (등록하기)-->

    <div class="container">
        <div class="card">
            <div class="input-box input-is-not-empty">
                <input type="text" id="un" name="username">
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" id="pw" name="password">
                <label for="pw">비밀번호</label>
            </div>
            <button class="register-button">등록하기</button>
        </div>
    </div>
    <script>
        let userList = [];

        function autoIncrement() {
            let currentId = 0;

            return function() {
                currentId++;
                return currentId;
            }
        }

        const getNewId = autoIncrement();

        const inputBoxs = document.querySelectorAll(".input-box");
        for (let inputBox of inputBoxs) {
            const inputElement = inputBox.querySelector("input");
            inputElement.onfocus = (event) => {
                inputBox.classList.add("input-is-not-empty");
            }

            inputElement.onblur = (event) => {
                if (!event.target.value) {
                    inputBox.classList.remove("input-is-not-empty");
                }
            }
        }

        const registerButton = document.querySelector(".register-button");
        registerButton.onclick = () => {
            const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));
            let newUser = {
                id: getNewId(),
            }

            Array.from(inputs).forEach(element => {
                const {name, value} = element;
                newUser = {
                    ...newUser,
                    [name]: value,
                }
            });

            userList = [
                ...userList,
                newUser,
            ]
            console.log(userList);
        }
    </script>
</body>
</html>
