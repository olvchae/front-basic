<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <script>
            class Studnet {
                constructor() {
                    console.log("생성자 호출!!!");
                }
            }

            const s1 = new Studnet();
            const s2 = new Studnet();
            console.log(typeof s1);
            console.log(s2 === s1);

            const s3 = {};  //중괄호 만으로도 new가 일어남   (new Object();라고 생각하면 쉬움)
            const s4 = {};
            console.log(typeof s3);
            console.log(s3 === s4);

            s1.name = "김은채";
            console.log(s1.name);
            s3.name = "김은채";
            console.log(s3.name);
            s2["name"] = "김은채";  //키값은 문자열이어야 한다.  hash-map이랑 비슷한 느낌 
            console.log(s2.name);
            console.log(s2["name"]);

            const key = "name";
            console.log(s1[key]);
            const datas = {
                names: ["김은채", "김은치"],
                ages: [33, 34],  //쉼표 생략 안 해도 js가 알아서 없애줌~
                a: () => {
                    console.log(datas.names);
                    console.log(datas.ages);
                }
            }
            
            console.log(datas["names"][0]);
            datas.a();
        </script>
    </body>
</html>
