<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // map(mapping) -> 일치하는 것을  1 : 1로 대응시킴 
        // [ 10, 20, 30 ] -> [ 100, 200, 300 ]  (치환하는 느낌)
        // [ {name: "은채"}, {name: "은채"}, {name: "은채"} ] -> [ "은채", "은채", {name: "은채"} ] (자료형이 달라질 수 있으나 1 : 1로 대응이 되어야 함)
        

        const arrayObject = {
            arr: [],
            map: (mapFx) => {
                console.log("1: " + mapFx);
                const newArray = [];
                console.log("2: " + newArray);
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    console.log("3: " + mapFx(arrayObject.arr[i]));
                    newArray.push(mapFx(arrayObject.arr[i]));
                }
                console.log("4: " + newArray);
                return newArray;
            },
            filter: (predicate) => {
                const newArray = [];
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    if (predicate(arrayObject.arr[i])) {
                        newArray.push(arrayObject.arr[i]);
                    }
                }
                return newArray;
            }
        }

        const names = [ "은채", "은차", "은치" ];
        console.log(names);
        arrayObject.arr = names;
        console.log(arrayObject.map(name => "김" + name));
        console.log(arrayObject.filter(name => !name.includes("은")));


        const box1 = {
            miniBox: {
                content: "미니박스1",
            }
        }

        const box2 = {
            miniBox: {
                content: "미니박스2",
            }
        }

        const box3 = {
            miniBox: {
                content: "미니박스3",
            }
        }

        const boxList = [ box1, box2, box3, ];
        const miniBoxList = [ box1.miniBox, box2.miniBox, box3.miniBox];
        const miniBoxList2 = [];
        for (let box of boxList) {
            miniBoxList2.push(box.miniBox);
        }
        const miniBoxList3 = boxList.map(box => box.miniBox);
        const contents = boxList.map(box => box.miniBox.content);
        console.log(miniBoxList3);
        console.log(contents);

        const name = "김은채";
        const message = `${name}님 환영합니다.`;
        console.log(message);

        const nameList = [ "김은채", "김은차", "김은치" ];
        console.log([ "<tr><td>김은채</td></tr>", "<tr><td>김은차</td></tr>", "<tr><td>김은치</td></tr>" ])
        console.log(nameList.map(name => `<tr><td>${name}</td></tr>`));

        const tableBody = document.querySelector(".name-table-body");
        console.log({tableBody});
        tableBody.innerHTML = nameList.map(name => `<tr><td>${name}</td></tr>`).join("");
    </script>
</body>
</html>
