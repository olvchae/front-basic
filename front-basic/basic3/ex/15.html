<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let price = -500;

        if(typeof price === number) {
            console.log("숫자를 입력하세요");
        }
        if (price <= 0) {
            console.log("가격은 0보다 커야 합니다.");
        }
        console.log("상품 가격: {price}원");
    </script>
</body>
</html>
