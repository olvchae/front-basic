<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for (let n = 1; n <= 30; n++) {
            if (n % 15 === 0) {
                console.log("FizzBuzz");
            } else if (n % 3 === 0) {
                console.log("Fizz");
            } else if (n % 5 === 0) {
                console.log("Buzz");
            } else {
                console.log(n);
            }
        }
    </script>
</body>
</html>
