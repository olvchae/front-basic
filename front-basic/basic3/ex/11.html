<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day = 7;

        switch (day) {
            case 1: 
                console.log("월요일");
                break;
            case 2: 
                console.log("화요일");
                break;
            case 3: 
                console.log("수요일");
                break;
            case 4: 
                console.log("목요일");
                break;
            case 5: 
                console.log("금요일");
                break;
            case 6: 
                console.log("토요일");
                break;
            case 7: 
                console.log("일요일");
                break;
            default: 
                console.log("잘못된 입력");
                break;
        }
    </script>
</body>
</html>
