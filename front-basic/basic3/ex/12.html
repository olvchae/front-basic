<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let month = 7;

        switch (month) {
            case 3: case 4: case 5:
                console.log("봄");
                break;
            case 6: case 7: case 8:
                console.log("여름");
                break;
            case 9: case 10: case 11:
                console.log("가을");
                break;
            case 12: case 1: case 2:
                console.log("겨울");
                break;
            default:
                console.log("잘못된 입력");
        }
    </script>
</body>
</html>
