    <script>
        function a() {

        }

        const b = a;
        a();
        b();

        function c(d) {
            d(); // 결론적으로 a 호출한 것 = 콜백
        }

        c(a);

        function calc(run, ...num) {
            return run(num);
        }

        function addition(num) {
            return num === 0 ? 0 : num + addition(num - 1);
        }

        function factorial(num) {
            return num === 0 || num === 1 ? 1 : num + factorial(num - 1);
        }

        const result1 = calc(addition, 10);
        const result2 = calc(factorial, 10);
        console.log(result1, result2);


        // 여기에 코드를 작성하세요

        function myMap(nums = [], fx) {
            const newArray = [];
            for(let i = 0; i < nums.length; i++) {
                newArray.push(fx(nums[i]));
            }

            nums.forEach(n => newArray.push(fx(n)));

            for (let n of nums) {
                newArray.push(fx(n));
            }

            return newArray;
        }

        function myMap2(nums, fx) {
            return nums.map(n => fx(n));
        }

        const arr = [1, 2, 3, 4, 5, 6, 7, 8];
        const result = arr.splice(2, 2, 10);
        console.log(arr);
        console.log(result);


        console.log(myMap([1, 2, 3, 4], (x) => x * 2));   // [2, 4, 6, 8]
        console.log(myMap([1, 2, 3, 4], (x) => x ** 2));  // [1, 4, 9, 16]
    </script>
