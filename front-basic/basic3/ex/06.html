<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log("5" + 3);       // 예측: 53
        console.log("5" - 3);       // 예측: 2
        console.log(true + 1);      // 예측: 2 
        console.log(false + "개");  // 예측: false개
        console.log(null + 1);      // 예측: 1
    </script>
</body>
</html>
