          //클로저 : 값을 격리시킴 -> 함수 필요

            let num = 0;

            return function () {
                num++;
                return num;
            }
          }

          const b = a();
          const c = a();
          
          console.log(b());
          console.log(b());
          console.log(b());

          }

            return n + n2;
          }
    </script>
