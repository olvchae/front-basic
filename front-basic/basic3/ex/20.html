<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function stats(...params) {
            console.log(params);

            let result = {
                sum: 60,
                avg: 60,
            }

            for (let n = 0; n < params.length; n++) {
                result.sum += params[n];
            }

            result.avg = result.sum / params.length;

            return result;
        }

        console.log(stats(10, 20, 30));        // { sum: 60, avg: 20 }
        console.log(stats(5, 15, 25, 35, 40)); // { sum: 120, avg: 24 }
    </script>
</body>
</html>
