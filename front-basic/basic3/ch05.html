<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 배열 + 객체
        // 배열 선언 초기화
        const arr = [];
        const arr2 = new Array();
        const students = [];
        const s1 = {
            name: "김은채",
            age: 22,
        };
        const s2 = {
            name: "이은채",
            age: 23,
        };
        students.push(s1);
        students.push(s2);

        const students2 = [
            {
                name: "김은채",
                age: 22,
            },
            {
                name: "이은채",
                age: 23,
            },
        ]

        console.log(students2);

        const students3 = [
            ...students2,   // students2 안의 요소를 copy (객체 또는 배열의 요소들을 복제) -> spread 문법 
            {
                name: "박은채",
                age: 24,
            },
        ]

        console.log(students3);

        const students4 = [
            ...students2,
            {
                ...students3[2],
                address: "남구",
            }
        ]

        console.log(students4);

        const nums = [10, 20, 30, 40];
        const nums2 = [...nums, 50];
        console.log(nums);
        console.log(nums2);

        const user = {
            username: "aaa",
            password: "1234",
        }

        const user2 = {
            ...user,
            name: "김은채",
        }
        console.log(user);
        console.log(user2);
    </script>
</body>
</html>
